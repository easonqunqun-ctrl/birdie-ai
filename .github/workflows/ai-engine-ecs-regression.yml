name: AI Engine ECS Regression

on:
  push:
    branches: [main]
    paths:
      - 'ai_engine/**'
      - '.github/workflows/ai-engine-ecs-regression.yml'
  pull_request:
    paths:
      - 'ai_engine/**'
      - '.github/workflows/ai-engine-ecs-regression.yml'

jobs:
  ecs-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_engine
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --group dev

      - name: ECS v1 regression tests
        run: uv run pytest tests/test_ecs_regression.py tests/test_skeleton_fps.py -v --tb=short

      - name: Ruff (ecs + pipeline lazy imports)
        run: uv run ruff check app/ecs/ app/pipeline/__init__.py app/pipeline/visualize.py tests/test_ecs_regression.py tests/test_skeleton_fps.py tests/ecs/
