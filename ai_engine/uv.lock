[[package]]
name = "xiaoniao-ai-engine"
version = "0.1.1"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "httpx" },
    { name = "mediapipe" },
    { name = "minio" },
    { name = "numpy" },
    { name = "opencv-python-headless" },
    { name = "pyarrow" },
    { name = "pydantic" },
    { name = "pydantic-settings" },
    { name = "pyyaml" },
    { name = "redis" },
    { name = "structlog" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.optional-dependencies]
ai-torch = [
    { name = "torch" },
]

[package.dev-dependencies]
dev = [
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "fastapi", specifier = ">=0.115.0" },
    { name = "httpx", specifier = ">=0.27.0" },
    { name = "mediapipe", specifier = "==0.10.14" },
    { name = "minio", specifier = ">=7.2.0" },
    { name = "numpy", specifier = ">=1.26.0" },
    { name = "opencv-python-headless", specifier = ">=4.9.0,<5" },
    { name = "pyarrow", specifier = ">=16.0.0,<19" },
    { name = "pydantic", specifier = ">=2.7.0" },
    { name = "pydantic-settings", specifier = ">=2.3.0" },
    { name = "pyyaml", specifier = ">=6.0.0,<7" },
    { name = "redis", specifier = ">=5,<6" },
    { name = "structlog", specifier = ">=24.1.0" },
    { name = "torch", marker = "extra == 'ai-torch'", specifier = ">=2.2.0" },
    { name = "uvicorn", extras = ["standard"], specifier = ">=0.30.0" },
]
provides-extras = ["ai-torch"]

[package.metadata.requires-dev]
dev = [
    { name = "pytest", specifier = ">=8.2.0" },
    { name = "pytest-asyncio", specifier = ">=0.23.0" },
    { name = "ruff", specifier = ">=0.5.0" },
]
