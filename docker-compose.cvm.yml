# =====================================================
# CVM / 准生产：取消源码绑定挂载（与 base + docker-compose.test 叠加使用）
# =====================================================
# 用法（仓库根、与 `.env.local` 同级）：
#   docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.cvm.yml --env-file .env.local up -d --build
# 或：make deploy-cvm-up
#
# 含义：
# - backend / celery-worker / ai_engine 不再挂载 ./backend、./ai_engine 到容器 /app，
#   仅以镜像内 Dockerfile `COPY`/构建结果为准。
# - 云上更新代码：**git pull → build 对应服务**，勿再依赖宿主目录「补 alembic / uv sync」。
#
# 真实微信支付：复制 `docker-compose.wechat-pay-key.example.yml` → `docker-compose.wechat-pay-key.yml`，
# 挂载 `apiclient_key.pem`；`.env.local` 设 `WECHAT_PAY_CERT_PATH=/secrets/apiclient_key.pem`；
# `make deploy-cvm-up` 会在该文件存在时自动叠加。
#
# Compose 合并规则：`volumes: !reset []` 清空基类里对上述服务的 bind（见 Compose merge 文档）。
# =====================================================

services:
  backend:
    volumes: !reset []
    # CVM 无源码挂载时 `uv run` 易在启动阶段长时间锁 PyPI；镜像内 .venv 已 uv sync，直接调二进制。
    command: >
      sh -c "
      /app/.venv/bin/alembic upgrade head &&
      /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  celery-worker:
    volumes: !reset []
    command: /app/.venv/bin/celery -A app.celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    command: /app/.venv/bin/celery -A app.celery_app beat --loglevel=info

  ai_engine:
    volumes: !reset []
