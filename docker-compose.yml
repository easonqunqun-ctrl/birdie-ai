# =====================================================
# 「小鸟 AI」本地开发环境
# 使用：make up 一键启动全套服务
# =====================================================
# Compose 项目名称固定为 xiaoniao，避免因仓库目录名变为 golf / 路径变化
# 导致 project 漂移、固定网络 xiaoniao-network 告警或容器 orphan。
name: xiaoniao

services:
  postgres:
    image: postgres:16-alpine
    container_name: xiaoniao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xiaoniao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xiaoniao_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-xiaoniao}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xiaoniao}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xiaoniao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: xiaoniao-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 控制台 UI: http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 自动创建 MinIO bucket（一次性运行后退出）
  minio-init:
    image: minio/mc:latest
    container_name: xiaoniao-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb -p local/${MINIO_BUCKET:-xiaoniao-videos} || true;
      mc anonymous set download local/${MINIO_BUCKET:-xiaoniao-videos};
      echo 'MinIO bucket ready.';
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # 国内构建若报 `files.pythonhosted.org` / pycryptodome 超时：在 `.env.local` 加一行
        # UV_PYPI_MIRROR=https://pypi.tuna.tsinghua.edu.cn/simple（或阿里云 / 腾讯镜像）
        UV_DEFAULT_INDEX: ${UV_PYPI_MIRROR:-https://pypi.org/simple}
    container_name: xiaoniao-backend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      AI_ENGINE_URL: http://ai_engine:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
      uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        UV_DEFAULT_INDEX: ${UV_PYPI_MIRROR:-https://pypi.org/simple}
    container_name: xiaoniao-celery-worker
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      AI_ENGINE_URL: http://ai_engine:9000
    # W6-T5：Celery worker 本身不做推理，只是派发 + 回填 DB；1G 足够（httpx + 少量 JSON）
    mem_limit: 1g
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # --concurrency=2 + ai_engine concurrency 隐含为 uvicorn 的 1 worker，
    # 等于同时最多 2 条分析排队；本地 MacBook Pro 16GB 跑起来舒适。
    # 生产扩容策略在 docs/release-notes/W6-real-engine-walkthrough.md 里记录。
    command: uv run celery -A app.celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        UV_DEFAULT_INDEX: ${UV_PYPI_MIRROR:-https://pypi.org/simple}
    container_name: xiaoniao-celery-beat
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      AI_ENGINE_URL: http://ai_engine:9000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A app.celery_app beat --loglevel=info

  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
      args:
        UV_DEFAULT_INDEX: ${UV_PYPI_MIRROR:-https://pypi.org/simple}
      # MediaPipe 只发布了 x86_64/macOS-arm64/Windows 三种 wheel；Linux aarch64 没有。
      # 为了让 Apple Silicon 开发机（arm64）和生产服务器（x86_64）都能跑同一份镜像，
      # 强制 linux/amd64 构建。M1/M2 Mac 上会走 Rosetta 2 模拟，性能比原生 arm64
      # 慢 1.5-2x，但对 CPU 推理 3-8s 的视频来说仍在 MVP §4.2 的 <30s 预算内。
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: xiaoniao-ai-engine
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      # 未写进 .env.local 时仍默认真实引擎（骨骼/评分走 MediaPipe）；本地改 true 可秒回 mock
      AI_ENGINE_MOCK_MODE: ${AI_ENGINE_MOCK_MODE:-false}
    # W6-T4：mock vs real 以环境变量为准（见上）；.env.local 可覆盖
    # W6-T5：单视频 MediaPipe 推理峰值 ~800MB（含 ffmpeg + opencv 缓冲），
    # 2G 留 ~2.5x buffer，防止 OOM kill；生产多路并行时要线性抬高。
    mem_limit: 2g
    ports:
      # 宿主机 9100 → 容器内 9000；9000 已被 MinIO S3 API 占用。
      # 容器间仍走 http://ai_engine:9000（见 .env 中的 AI_ENGINE_URL）。
      - "9100:9000"
    volumes:
      - ./ai_engine:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload

  # ============================================================
  # P2-W14-A · 监控栈（profile=monitoring · 默认不启动）
  # ============================================================
  # 启动：docker compose --profile monitoring up -d prometheus alertmanager webhook-echo
  # 停止：docker compose --profile monitoring down
  # 详见 infra/monitoring/README.md
  #
  # 资源预算（CVM 4G 内存场景）：
  #   prometheus    mem ≤ 256M（30s scrape + 7d retention）
  #   alertmanager  mem ≤ 64M
  #   webhook-echo  mem ≤ 16M
  # 总 ≤ 350M，对现有 backend(0.5G)+ai_engine(2G)+pg(0.5G) 压力可接受
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: xiaoniao-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus-alerts.yml:/etc/prometheus/rules/ai_engine.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # 7 天保留够看周报告了；CVM 磁盘紧不要更长
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      # 仅 bind 127.0.0.1（不暴露公网）；要看面板走 SSH 端口转发：
      # ssh -L 9090:127.0.0.1:9090 ubuntu@cvm
      - "127.0.0.1:9090:9090"
    mem_limit: 256m
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: xiaoniao-alertmanager
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "127.0.0.1:9093:9093"
    mem_limit: 64m

  # 占位收件人：alertmanager-to-wechat-bot 还没接入前，先 echo 看 alert payload
  # 真接生产渠道（企业微信群机器人）走 W18+，把 alertmanager.yml receivers 的 url 改即可
  #
  # W15-A 修正：原 ealen/echo-server 在腾讯云国内镜像源 unknown error，
  # 换 mendhak/http-https-echo（默认 8080，环境变量改 9094）。两者都是把请求体回显，功能等价。
  webhook-echo:
    image: mendhak/http-https-echo:31
    container_name: xiaoniao-webhook-echo
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      HTTP_PORT: "9094"
      LOG_IGNORE_PATH: "/ping"
    ports:
      - "127.0.0.1:9094:9094"
    mem_limit: 32m

  # W19-C · Alertmanager → 企业微信群机器人（需 WECOM_WEBHOOK_KEY）
  wechat-webhook-bridge:
    image: python:3.11-alpine
    container_name: xiaoniao-wechat-webhook-bridge
    restart: unless-stopped
    profiles: ["monitoring"]
    working_dir: /app
    volumes:
      - ./infra/monitoring/wechat_webhook_bridge.py:/app/wechat_webhook_bridge.py:ro
    environment:
      WECOM_WEBHOOK_PORT: "9095"
      WECOM_WEBHOOK_KEY: ${WECOM_WEBHOOK_KEY:-}
    command: ["python", "/app/wechat_webhook_bridge.py"]
    ports:
      - "127.0.0.1:9095:9095"
    mem_limit: 32m

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  alertmanager_data:

networks:
  default:
    name: xiaoniao-network
