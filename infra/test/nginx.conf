# =====================================================
# W8-T4：测试环境 nginx 反向代理配置
# =====================================================
# 路由约定：
#   /v1/*            → backend:8000 （FastAPI；含 SSE 流）
#   /minio/*         → minio:9000   （S3 兼容；前端 putObject 通过这里上传）
#   其它             → 404
#  TLS 证书（容器内路径固定）：
#   /etc/nginx/certs/fullchain.pem   + privkey.pem
#   • 自签：make test-certs HOST=… → gen-certs.sh 生成并写入上述文件名
#   • 可信 CA（微信小程序必）：Let's Encrypt → make issue-le-cert EMAIL=…（见 infra/deploy/README.md）
# 关键配置点：
#   - SSE：proxy_buffering off + chunked_transfer_encoding on，避免 LLM 流被缓存到一坨
#   - 长连接：proxy_read_timeout 600s，覆盖单次分析最坏情况（30s 视频 + 60s 引擎 + buffer）
#   - 上传：client_max_body_size 100m，对齐 backend.MAX_VIDEO_SIZE_BYTES
#   - Docker：Compose 重建 backend/minio 后容器 IP 会变；静态 `proxy_pass http://name:port` 会在
#     worker 里缓存旧 IP → 502。`resolver 127.0.0.11` + 变量形式的 `proxy_pass` 按请求解析。
#     `/minio/` 须在 rewrite break 后用 `proxy_pass http://$minio_host:9000$uri`，否则会带上 `/minio` 前缀。
# =====================================================

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 真实客户端 IP（CVM 内层）
    log_format combined_with_xff '$remote_addr - $remote_user [$time_local] '
                                 '"$request" $status $body_bytes_sent '
                                 '"$http_referer" "$http_user_agent" '
                                 'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log combined_with_xff;
    error_log  /var/log/nginx/error.log warn;

    # SSE / WebSocket 升级用
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ==================== HTTP → HTTPS 永久跳转 ====================
    server {
        listen 80 default_server;
        server_name _;
        # ACME challenge 留口（W9 上正式证书时 certbot --webroot）
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==================== HTTPS 业务入口 ====================
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # 单文件最大 100MB（backend.MAX_VIDEO_SIZE_BYTES）；nginx 默认 1m，必须放
        client_max_body_size 100m;
        client_body_timeout  600s;

        # Docker 内置 DNS（见 https://docs.docker.com/network/#dns-services ）
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ----- 1) backend FastAPI -----
        location /v1/ {
            set $backend_host backend;
            proxy_pass         http://$backend_host:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;

            # SSE：禁缓存、禁 buffering，否则 chat 流会"等满一缓冲区才下发"
            proxy_buffering           off;
            proxy_cache               off;
            proxy_request_buffering   off;
            chunked_transfer_encoding on;

            # 单次分析最坏 ≈ AI_ENGINE_TIMEOUT(60s) + DB/Celery 调度 buffer
            proxy_read_timeout        600s;
            proxy_send_timeout        600s;
            proxy_connect_timeout     10s;
        }

        # ----- 2) MinIO S3 API（前端 putObject 用） -----
        # 注意：MINIO_PUBLIC_ENDPOINT 需配成 https://<host>/minio
        # 这样 backend 签出来的 presigned URL 才走得通这里。
        location /minio/ {
            # 去掉 /minio 前缀再转给 minio；动态解析 minio 主机名（见文件头注释）
            rewrite ^/minio/(.*)$ /$1 break;
            set $minio_host minio;
            proxy_pass         http://$minio_host:9000$uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # MinIO 需要这个，否则 multipart 上传容易 broken pipe
            proxy_request_buffering off;
            proxy_buffering         off;

            # 上传大文件耗时
            proxy_connect_timeout   60s;
            proxy_read_timeout      300s;
            proxy_send_timeout      300s;
        }

        # ----- 3) 其它 → 404，避免误暴露 ----
        location / {
            return 404;
        }
    }
}
